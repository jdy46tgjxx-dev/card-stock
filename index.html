<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18324a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Card Stock">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Card Stock</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Business card stock</p>
        <h1>Card Stock</h1>
      </div>
      <div class="header-count">
        <span id="totalCount">0</span>
        <small>件登録</small>
      </div>
    </header>

    <main class="main-content">
      <section class="search-panel" id="searchPanel" aria-label="検索と絞り込み">
        <label class="field-label" for="keywordInput">キーワード検索</label>
        <div class="search-row">
          <input id="keywordInput" type="search" autocomplete="off" placeholder="会社名・氏名・電話・メモ">
          <button class="ghost-button" id="clearSearchButton" type="button">クリア</button>
        </div>
        <label class="field-label" for="categoryFilter">カテゴリ</label>
        <select id="categoryFilter">
          <option value="">すべて</option>
        </select>
        <p class="result-line"><span id="resultCount">0</span>件を表示中</p>
      </section>

      <section class="list-section" aria-live="polite">
        <div id="cardList" class="card-list"></div>
        <div id="emptyState" class="empty-state" hidden>
          <h2>まだ名刺が登録されていません。</h2>
          <p>業者・本部・行政・修理関係などの連絡先をここに保存できます。</p>
        </div>
      </section>

      <section class="settings-panel" id="settingsPanel" hidden aria-label="設定">
        <h2>バックアップ</h2>
        <p>名刺データと画像は端末内に保存されます。端末変更やブラウザデータ削除に備えて、定期的にJSONを書き出してください。</p>
        <div class="settings-actions">
          <button class="primary-button" id="exportButton" type="button">JSONバックアップ</button>
          <button class="secondary-button" id="importButton" type="button">JSONから復元</button>
          <input id="importFileInput" type="file" accept="application/json,.json" hidden>
        </div>
      </section>
    </main>

    <nav class="bottom-bar" aria-label="主要操作">
      <button class="nav-button active" id="showListButton" type="button">
        <span>一覧</span>
      </button>
      <button class="nav-button" id="showSearchButton" type="button">
        <span>検索</span>
      </button>
      <button class="add-button" id="openFormButton" type="button">
        <span>登録</span>
      </button>
      <button class="nav-button" id="showSettingsButton" type="button">
        <span>設定</span>
      </button>
    </nav>
  </div>

  <dialog id="formDialog" class="sheet-dialog">
    <form id="cardForm" method="dialog" class="sheet-content">
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Card entry</p>
          <h2 id="formTitle">名刺登録</h2>
        </div>
        <button class="icon-button" id="closeFormButton" type="button" aria-label="閉じる">×</button>
      </div>

      <input id="cardId" type="hidden">
      <div class="form-grid">
        <label>会社名<input id="companyInput" name="company" type="text" autocomplete="organization"></label>
        <label>氏名<input id="nameInput" name="name" type="text" autocomplete="name"></label>
        <label>役職<input id="positionInput" name="position" type="text"></label>
        <label>電話番号<input id="phoneInput" name="phone" type="tel" autocomplete="tel"></label>
        <label>メールアドレス<input id="emailInput" name="email" type="email" autocomplete="email"></label>
        <label>カテゴリ<select id="categoryInput" name="category"></select></label>
        <label>最終連絡日<input id="lastContactDateInput" name="lastContactDate" type="date"></label>
        <label class="wide">メモ<textarea id="memoInput" name="memo" rows="4"></textarea></label>
      </div>

      <div class="image-section">
        <div class="image-picker">
          <div class="image-preview" id="frontPreview">表面画像</div>
          <button class="secondary-button" id="frontImageButton" type="button">表面を撮影</button>
          <input id="frontImageInput" type="file" accept="image/*" capture="environment" hidden>
        </div>
        <div class="image-picker">
          <div class="image-preview" id="backPreview">裏面画像</div>
          <button class="secondary-button" id="backImageButton" type="button">裏面を撮影</button>
          <input id="backImageInput" type="file" accept="image/*" capture="environment" hidden>
        </div>
      </div>

      <p id="formError" class="error-message" hidden></p>

      <div class="sheet-actions">
        <button class="ghost-button" id="cancelFormButton" type="button">キャンセル</button>
        <button class="primary-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="detailDialog" class="sheet-dialog">
    <div class="sheet-content detail-content">
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Card detail</p>
          <h2 id="detailName">未登録</h2>
        </div>
        <button class="icon-button" id="closeDetailButton" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="detail-images">
        <div class="detail-image-box" id="detailFrontImage">表面画像なし</div>
        <div class="detail-image-box" id="detailBackImage">裏面画像なし</div>
      </div>
      <div class="detail-fields" id="detailFields"></div>
      <div class="sheet-actions">
        <button class="danger-button" id="deleteButton" type="button">削除</button>
        <button class="secondary-button" id="editButton" type="button">編集</button>
      </div>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="./js/db.js" defer></script>
  <script src="./js/image.js" defer></script>
  <script src="./js/ui.js" defer></script>
  <script src="./js/app.js" defer></script>
</body>
</html>
